name: Android Build

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    name: Assemble Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Download Gradle wrapper jar (we don't commit it)
        run: |
          mkdir -p android/gradle/wrapper
          curl -sSL -o android/gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew

      - name: Assemble debug APK
        working-directory: android
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          # CI builds without a real Maps key still compile + assemble; the map
          # just renders blank at runtime. Use repo secret MAPS_API_KEY to
          # enable real tiles in CI artefacts.
          ./gradlew --no-daemon assembleDebug \
            -PMAPS_API_KEY="${MAPS_API_KEY:-}"

      - name: Upload APK artefact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TacticalMaps-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
