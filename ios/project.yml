name: TacticalMaps
options:
  bundleIdPrefix: com.tacticalmaps
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  # Vendored locally with a 4-line Xcode-26 compiler-inference fix in
  # mgrs-ios/utm/UTM.swift (the upstream UTM formulae are single expressions
  # that exceed Swift 6's type-checker budget). See docs/ARCHITECTURE.md.
  mgrs-ios:
    path: Vendor/mgrs-ios

targets:
  TacticalMaps:
    type: application
    platform: iOS
    sources:
      - path: TacticalMaps
        excludes:
          - "**/.DS_Store"
    # No bundled sample resources — the app ships empty. Users import
    # their own GeoPDFs via the Files picker. The repo's `samples/`
    # directory is dev-only (handy for testing the import path).
    info:
      path: TacticalMaps/Resources/Info.plist
      properties:
        CFBundleDisplayName: TacticalMaps
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "15"
        UILaunchScreen:
          UIColorName: LaunchBackground
        # iOS 16+ devices are all arm64. armv7 is 32-bit and would
        # silently bar every modern device (Apple flags it on review).
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # iPad multitasking (Split View) requires all 4 orientations
        # including UpsideDown. iPhone keeps the 3-orientation set.
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: TacticalMaps shows your live position on the map and reads it as an MGRS grid reference.
        # NOTE: No background location. The app only requests
        # When-In-Use authorization (see LocationService.swift) and does
        # not enable allowsBackgroundLocationUpdates. Declaring
        # UIBackgroundModes:[location] or the "Always" usage string
        # without a persistent-location feature triggers App Store
        # rejection under guideline 2.5.4 — re-add both only when
        # background route logging actually ships.
        ITSAppUsesNonExemptEncryption: false
        # Surface the app's Documents folder in the Files app so the user can
        # drop GeoPDFs into TacticalMaps from Files → "On My iPhone".
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tacticalmaps.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: TacticalMaps/Resources/Info.plist
        # Apple Developer team. Debug uses Xcode-managed development signing;
        # Release archives use the App Store Connect distribution profile.
        DEVELOPMENT_TEAM: 6MY34D5RKG
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: TacticalMaps
    dependencies:
      - package: mgrs-ios
        product: MGRS
    scheme:
      testTargets:
        - TacticalMapsTests
        - TacticalMapsUITests
      gatherCoverageData: true
      # Local IAP testing without App Store Connect — purchases resolve
      # against this config. Production uses the real ASC product.
      run:
        storeKitConfiguration: TacticalMaps.storekit
      test:
        storeKitConfiguration: TacticalMaps.storekit

  TacticalMapsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TacticalMapsTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: TacticalMaps
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.tacticalmaps.app.tests
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGNING_ALLOWED: "NO"

  # UI-test target used only to capture App Store screenshots
  # deterministically (Menu → sheets → snap). Not part of CI logic;
  # run with -only-testing:TacticalMapsUITests. See scripts/ios_screenshots.sh.
  TacticalMapsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TacticalMapsUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: TacticalMaps
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.tacticalmaps.app.uitests
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGNING_ALLOWED: "NO"
        TEST_TARGET_NAME: TacticalMaps
